name: Bug
description: Report a bug with reproducible steps
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is failing.
      placeholder: One concise paragraph.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Compiler:
        - Branch/commit:
    validations:
      required: true
