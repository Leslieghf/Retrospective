name: Audit

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo xtask audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install C++ toolchain deps
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Xtask audit
        run: cargo xtask audit
